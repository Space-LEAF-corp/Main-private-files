<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Seven — Emoji Texture Engine</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      background: #000;
    }

    #wall {
      display: grid;
      width: 100vw;
      height: 100vh;
      place-items: center;
      gap: 8px;
    }

    .emoji-tile {
      font-size: 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease;
    }

    .emoji-tile:hover {
      transform: scale(1.15);
    }
  </style>
</head>

<body>

  <!-- Container for the emoji wallpaper -->
  <div id="wall"></div>

  <!-- Audio element for emoji sound nodes -->
  <audio id="emoji-audio" crossorigin="anonymous"></audio>

  <!-- Load engine + modes -->
  <script type="module">
    import { engine } from "./src/engine.js";
    import { MODES } from "./modes/modes.js";

    // Choose your default mode here
    engine.loadMode(MODES.Calm);
  </script>

</body>
</html>
