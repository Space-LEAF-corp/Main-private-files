<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Virtual Engine + Circular QR Demo</title>
  <style>
    body {
      background: #050711;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }
    canvas {
      background: radial-gradient(circle at center, #111 0%, #020308 70%);
      border-radius: 12px;
    }
    .row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <h2>Virtual Engine Core + Circular Access Code</h2>
  <div class="row">
    <canvas id="engine" width="320" height="320"></canvas>
    <canvas id="moonCode" width="320" height="320"></canvas>
  </div>

  <script>
    // ---------- VIRTUAL ENGINE CORE ----------
    const engineCanvas = document.getElementById('engine');
    const ectx = engineCanvas.getContext('2d');
    const eCenter = { x: engineCanvas.width / 2, y: engineCanvas.height / 2 };

    function drawEngineCore(t) {
      const time = t * 0.001;
      ectx.clearRect(0, 0, engineCanvas.width, engineCanvas.height);

      // Outer glow
      const gradient = ectx.createRadialGradient(
        eCenter.x, eCenter.y, 10,
        eCenter.x, eCenter.y, 140
      );
      gradient.addColorStop(0, 'rgba(255, 200, 80, 1)');
      gradient.addColorStop(0.3, 'rgba(255, 120, 40, 0.9)');
      gradient.addColorStop(0.6, 'rgba(40, 160, 255, 0.5)');
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ectx.fillStyle = gradient;
      ectx.beginPath();
      ectx.arc(eCenter.x, eCenter.y, 140, 0, Math.PI * 2);
      ectx.fill();

      // Rotating inner rings
      for (let i = 0; i < 3; i++) {
        const radius = 40 + i * 20;
        const angle = time * (0.6 + i * 0.4) * (i % 2 === 0 ? 1 : -1);
        ectx.save();
        ectx.translate(eCenter.x, eCenter.y);
        ectx.rotate(angle);
        ectx.strokeStyle = i === 0 ? '#ffe08a' : i === 1 ? '#ff7b4a' : '#4fd5ff';
        ectx.lineWidth = 3;
        ectx.setLineDash([10, 8]);
        ectx.beginPath();
        ectx.arc(0, 0, radius, 0, Math.PI * 2);
        ectx.stroke();
        ectx.restore();
      }

      // Pulsing core
      const pulse = 10 + Math.sin(time * 4) * 4;
      ectx.fillStyle = '#fff5c4';
      ectx.beginPath();
      ectx.arc(eCenter.x, eCenter.y, pulse, 0, Math.PI * 2);
      ectx.fill();

      // Vertical energy beam
      ectx.save();
      ectx.translate(eCenter.x, eCenter.y);
      const beamWidth = 18 + Math.sin(time * 6) * 4;
      const beamGrad = ectx.createLinearGradient(0, -140, 0, 140);
      beamGrad.addColorStop(0, 'rgba(255, 230, 160, 0)');
      beamGrad.addColorStop(0.3, 'rgba(255, 210, 120, 0.8)');
      beamGrad.addColorStop(0.7, 'rgba(255, 140, 60, 0.9)');
      beamGrad.addColorStop(1, 'rgba(255, 80, 40, 0)');
      ectx.fillStyle = beamGrad;
      ectx.beginPath();
      ectx.rect(-beamWidth / 2, -140, beamWidth, 280);
      ectx.fill();
      ectx.restore();
    }

    // ---------- CIRCULAR ROTATING-DOT "QR" ----------
    const moonCanvas = document.getElementById('moonCode');
    const mctx = moonCanvas.getContext('2d');
    const mCenter = { x: moonCanvas.width / 2, y: moonCanvas.height / 2 };

    // Example payload bits (you’d replace this with real encoding)
    const payloadBits = '10110100101101001011010010110100'; // 32 bits
    const ringCount = 2;
    const dotsPerRing = payloadBits.length / ringCount; // 16 per ring

    function drawMoonCode(t) {
      const time = t * 0.001;
      mctx.clearRect(0, 0, moonCanvas.width, moonCanvas.height);

      // Inner "moon" placeholder (where your art/image would go)
      const moonRadius = 90;
      const moonGrad = mctx.createRadialGradient(
        mCenter.x - 20, mCenter.y - 20, 10,
        mCenter.x, mCenter.y, moonRadius
      );
      moonGrad.addColorStop(0, '#fefefe');
      moonGrad.addColorStop(0.4, '#f0f4ff');
      moonGrad.addColorStop(1, '#1a2340');
      mctx.fillStyle = moonGrad;
      mctx.beginPath();
      mctx.arc(mCenter.x, mCenter.y, moonRadius, 0, Math.PI * 2);
      mctx.fill();

      // Outer subtle dotted code ring
      const baseRadius = 125;
      const rotationSpeed = 0.3; // radians per second
      const globalRotation = time * rotationSpeed;

      let bitIndex = 0;
      for (let ring = 0; ring < ringCount; ring++) {
        const radius = baseRadius + ring * 10;
        const count = dotsPerRing;
        for (let i = 0; i < count; i++) {
          const bit = payloadBits[bitIndex++] === '1' ? 1 : 0;
          const angle = globalRotation + (i / count) * Math.PI * 2;

          const x = mCenter.x + Math.cos(angle) * radius;
          const y = mCenter.y + Math.sin(angle) * radius;

          // Subtle encoding: size + brightness encode 0/1
          const dotRadius = bit ? 3.2 : 1.8;
          const alpha = bit ? 0.9 : 0.4;

          mctx.beginPath();
          mctx.fillStyle = `rgba(240, 245, 255, ${alpha})`;
          mctx.arc(x, y, dotRadius, 0, Math.PI * 2);
          mctx.fill();
        }
      }

      // Optional: faint outer ring to visually tie it together
      mctx.strokeStyle = 'rgba(200, 210, 240, 0.25)';
      mctx.lineWidth = 1;
      mctx.beginPath();
      mctx.arc(mCenter.x, mCenter.y, baseRadius + (ringCount - 1) * 10 + 6, 0, Math.PI * 2);
      mctx.stroke();
    }

    // ---------- ANIMATION LOOP ----------
    function loop(t) {
      drawEngineCore(t);
      drawMoonCode(t);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
