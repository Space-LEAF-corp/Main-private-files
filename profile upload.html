<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Profile Picture — Space LEAF Corp</title>
<style>
    body {
        background: #0b0b0b;
        color: #e0e0e0;
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 100px;
    }
    .box {
        background: #1a1a1a;
        padding: 40px;
        width: 450px;
        margin: auto;
        border-radius: 10px;
        border: 1px solid #333;
    }
    input {
        margin-top: 20px;
        padding: 10px;
        background: #222;
        border: 1px solid #444;
        border-radius: 5px;
        color: #e0e0e0;
    }
    button {
        margin-top: 20px;
        padding: 12px 20px;
        background-color: #7fffd4;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="box">
    <h2>Upload Profile Picture</h2>
    <input type="file">
    <button>Save & Continue</button>
</div>

</body>
</html>
