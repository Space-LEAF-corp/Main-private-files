<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Space Sandal Boot 3D Viewer</title>
  <style>
    body { margin:0; background:#050814; color:#f5f5f5; font-family:system-ui,sans-serif; }
    #topBar {
      padding:0.5rem 1rem;
      background:#0b1022;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid #222a3a;
    }
    #topBar button {
      padding:0.3rem 0.7rem;
      border-radius:6px;
      border:none;
      background:#2f7df4;
      color:#fff;
      font-weight:600;
      cursor:pointer;
    }
    #topBar button:hover {
      background:#2564c0;
    }
    #viewer { width:100vw; height:calc(100vh - 48px); }
    .small-text {
      font-size:0.8rem;
      opacity:0.8;
    }
  </style>
</head>
<body>
  <div id="topBar">
    <div>
      Space Sandal Boot — 3D Viewer
      <span class="small-text" id="designName"></span>
    </div>
    <button onclick="window.location.href='space_sandal_designer.html'">Back to Designer</button>
  </div>
  <div id="viewer"></div>

  <script src="three.min.js"></script>
  <script>
    const username = localStorage.getItem('ssb_username') || 'guest';
    const key = `ssb_design_${username}`;
    const raw = localStorage.getItem(key);
    let designBundle = null;
    if (raw) {
      designBundle = JSON.parse(raw);
    }

    const viewer = document.getElementById('viewer');
    const nameLabel = document.getElementById('designName');
    if (designBundle && designBundle.design && designBundle.design.name) {
      nameLabel.textContent = " — " + designBundle.design.name;
    } else {
      nameLabel.textContent = " — (no saved name)";
    }

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    viewer.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(2, 3, 4);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    const group = new THREE.Group();

    function hexToThreeColor(hex) {
      return new THREE.Color(hex || '#ffffff');
    }

    const bodyColor = designBundle?.design?.colors?.body || '#3b82f6';
    const soleColor = designBundle?.design?.colors?.sole || '#111827';
    const strapColor = designBundle?.design?.colors?.strap || '#f97316';

    const soleGeom = new THREE.BoxGeometry(3, 0.4, 1.2);
    const soleMat = new THREE.MeshStandardMaterial({ color: hexToThreeColor(soleColor) });
    const soleMesh = new THREE.Mesh(soleGeom, soleMat);
    soleMesh.position.set(0, 0, 0);
    group.add(soleMesh);

    const bodyGeom = new THREE.BoxGeometry(2.2, 2, 1.1);
    const bodyMat = new THREE.MeshStandardMaterial({ color: hexToThreeColor(bodyColor) });
    const bodyMesh = new THREE.Mesh(bodyGeom, bodyMat);
    bodyMesh.position.set(0, 1.3, 0);
    group.add(bodyMesh);

    const strapGeom = new THREE.BoxGeometry(2.4, 0.2, 1.0);
    const strapMat = new THREE.MeshStandardMaterial({ color: hexToThreeColor(strapColor) });
    const strapMesh = new THREE.Mesh(strapGeom, strapMat);
    strapMesh.position.set(0, 2.1, 0);
    group.add(strapMesh);

    scene.add(group);
    camera.position.set(5, 3, 5);
    camera.lookAt(0, 1, 0);

    let isDragging = false;
    let prevX = 0;

    viewer.addEventListener('mousedown', e => {
      isDragging = true;
      prevX = e.clientX;
    });
    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - prevX;
      prevX = e.clientX;
      group.rotation.y += dx * 0.01;
    });

    function animate() {
      requestAnimationFrame(animate);
      group.rotation.y += 0.002;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(viewer.clientWidth, viewer.clientHeight);
      camera.aspect = viewer.clientWidth / viewer.clientHeight;
      camera.updateProjectionMatrix();
    });
  </script>
</body>
</html>
