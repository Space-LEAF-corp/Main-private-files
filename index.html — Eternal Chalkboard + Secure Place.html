<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Eternal Chalkboard + Secure Place</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background:#111; color:#eee; }
    header, footer { padding: 12px 16px; background:#1a1a1a; border-bottom:1px solid #333; }
    main { display: grid; grid-template-columns: 1fr 380px; gap: 12px; padding: 12px; }
    canvas { background: #0c0c0c; border: 1px solid #333; border-radius: 8px; touch-action: none; }
    .panel { background:#151515; border:1px solid #333; border-radius:8px; padding:12px; }
    .row { display:flex; gap:8px; align-items:center; flex-wrap: wrap; }
    button, input, select { background:#222; color:#eee; border:1px solid #444; border-radius:6px; padding:6px 10px; }
    button:hover { background:#2a2a2a; }
    label { font-size: 12px; color:#bbb; }
    textarea { width:100%; min-height:160px; background:#0f0f0f; color:#eee; border:1px solid #333; border-radius:6px; padding:8px; }
    .small { font-size:12px; color:#aaa; }
    .mono { font-family: ui-monospace, Menlo, Consolas, monospace; }
  </style>
</head>
<body>
  <header>
    <div class="row" style="justify-content: space-between;">
      <div>
        <strong>Eternal Chalkboard</strong> — authored by Leif William Sogge
        <div class="small mono">Seal: Eternal Authorship • Ocala, FL • v1.0</div>
      </div>
      <div class="row">
        <button id="exportBtn">Export .chalk.json</button>
        <input type="file" id="importFile" accept=".json" />
      </div>
    </div>
  </header>

  <main>
    <section>
      <canvas id="chalk" width="1200" height="700"></canvas>
      <div class="row" style="margin-top:8px;">
        <label>Color</label>
        <input type="color" id="color" value="#e6ffe6" />
        <label>Width</label>
        <input type="range" id="width" min="1" max="30" value="6" />
        <button id="clearBtn">Clear</button>
        <button id="undoBtn">Undo</button>
        <span id="saveStatus" class="small mono"></span>
      </div>
    </section>

    <aside class="panel">
      <h3 style="margin-top:0;">Secure Place</h3>
      <label>Passphrase</label>
      <input type="password" id="pass" placeholder="Create or enter a passphrase" />
      <label style="margin-top:6px;">Encrypted notes</label>
      <textarea id="secureNotes" placeholder="Write here… (encrypted on save)"></textarea>
      <div class="row" style="margin-top:8px;">
        <button id="saveSecureBtn">Save encrypted</button>
        <button id="loadSecureBtn">Load</button>
        <button id="exportVaultBtn">Export vault</button>
        <input type="file" id="importVaultFile" accept=".json" />
      </div>
      <div class="small mono" id="secureStatus"></div>

      <hr style="border-color:#333; margin:12px 0;">
      <h4 style="margin:0;">Provenance</h4>
      <div class="small mono" id="provenanceBlock"></div>
    </aside>
  </main>

  <footer class="small mono">
    Integrity: <span id="integrityHash">(calculating…)</span> • Stored locally (IndexedDB)
  </footer>

<script>
/* ======= Authorship & Provenance ======= */
const AUTHOR = "Leif William Sogge";
const ARTIFACT = "Eternal Chalkboard v1.0";
const LOCALE = "Ocala, FL";
const PROVENANCE = {
  author: AUTHOR,
  artifact: ARTIFACT,
  locale: LOCALE,
  createdAt: new Date().toISOString(),
  clauses: [
    "Explicit authorship is required in all derivatives.",
    "Child safety and dignity are non-negotiable.",
    "Peaceful stewardship; no punitive use.",
  ],
};
document.getElementById("provenanceBlock").textContent = JSON.stringify(PROVENANCE, null, 2);

/* ======= IndexedDB (offline-first) ======= */
const DB_NAME = "eternal-chalkboard";
const DB_VERSION = 1;
let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = req.result;
      if (!db.objectStoreNames.contains("strokes")) db.createObjectStore("strokes", { keyPath: "id", autoIncrement: true });
      if (!db.objectStoreNames.contains("meta")) db.createObjectStore("meta", { keyPath: "key" });
      if (!db.objectStoreNames.contains("vault")) db.createObjectStore("vault", { keyPath: "key" });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function tx(store, mode="readonly") {
  return db.transaction(store, mode).objectStore(store);
}

async function saveStroke(stroke) {
  return new Promise((resolve, reject) => {
    const req = tx("strokes", "readwrite").add(stroke);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function getAllStrokes() {
  return new Promise((resolve, reject) => {
    const req = tx("strokes").getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function deleteLastStroke() {
  const all = await getAllStrokes();
  const last = all[all.length - 1];
  if (!last) return;
  return new Promise((resolve, reject) => {
    const req = tx("strokes", "readwrite").delete(last.id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function clearStrokes() {
  return new Promise((resolve, reject) => {
    const req = tx("strokes", "readwrite").clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

/* ======= Canvas drawing ======= */
const canvas = document.getElementById("chalk");
const ctx = canvas.getContext("2d");
let drawing = false, path = [];
const colorEl = document.getElementById("color");
const widthEl = document.getElementById("width");
const saveStatus = document.getElementById("saveStatus");

function drawStroke(s) {
  ctx.strokeStyle = s.color;
  ctx.lineWidth = s.width;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  ctx.beginPath();
  s.points.forEach((p, i) => {
    const [x, y] = p;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
}

function redrawAll(strokes) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  strokes.forEach(drawStroke);
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
  return [x, y];
}

canvas.addEventListener("pointerdown", (e) => {
  drawing = true;
  path = [getPos(e)];
});
canvas.addEventListener("pointermove", async (e) => {
  if (!drawing) return;
  path.push(getPos(e));
  const stroke = { color: colorEl.value, width: parseInt(widthEl.value,10), points: path };
  redrawAll(await getAllStrokes());
  drawStroke(stroke);
});
canvas.addEventListener("pointerup", async () => {
  if (!drawing) return;
  drawing = false;
  const stroke = { color: colorEl.value, width: parseInt(widthEl.value,10), points: path, ts: Date.now() };
  await saveStroke(stroke);
  saveStatus.textContent = "Saved stroke " + new Date().toLocaleTimeString();
  updateIntegrity();
});

document.getElementById("undoBtn").addEventListener("click", async () => {
  await deleteLastStroke();
  redrawAll(await getAllStrokes());
  updateIntegrity();
});

document.getElementById("clearBtn").addEventListener("click", async () => {
  await clearStrokes();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  updateIntegrity();
});

/* ======= Export/Import ======= */
async function sha256(str) {
  const enc = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function buildBundle() {
  const strokes = await getAllStrokes();
  const content = { strokes, provenance: PROVENANCE, savedAt: new Date().toISOString() };
  const integrity = await sha256(JSON.stringify(content));
  return { type: "chalk-bundle", version: "1.0.0", content, integrity };
}

document.getElementById("exportBtn").addEventListener("click", async () => {
  const bundle = await buildBundle();
  const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "eternal-chalkboard.chalk.json";
  a.click();
});

document.getElementById("importFile").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  const bundle = JSON.parse(text);
  const actual = await sha256(JSON.stringify(bundle.content));
  if (actual !== bundle.integrity) {
    alert("Integrity mismatch — bundle may be altered.");
    return;
  }
  await clearStrokes();
  const store = tx("strokes", "readwrite");
  bundle.content.strokes.forEach(s => store.add(s));
  redrawAll(await getAllStrokes());
  updateIntegrity();
});

/* ======= Integrity display ======= */
async function updateIntegrity() {
  const b = await buildBundle();
  document.getElementById("integrityHash").textContent = b.integrity;
}

/* ======= Secure Place (E2E encrypted vault) ======= */
async function deriveKey(passphrase, saltBase64) {
  const enc = new TextEncoder();
  const salt = saltBase64 ? Uint8Array.from(atob(saltBase64), c=>c.charCodeAt(0)) : crypto.getRandomValues(new Uint8Array(16));
  const imp = await crypto.subtle.importKey("raw", enc.encode(passphrase), {name:"PBKDF2"}, false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations: 100_000, hash: "SHA-256" },
    imp,
    { name:"AES-GCM", length: 256 },
    false,
    ["encrypt","decrypt"]
  );
  return { key, saltBase64: saltBase64 || btoa(String.fromCharCode(...salt)) };
}

async function encryptNotes(plaintext, passphrase) {
  const { key, saltBase64 } = await deriveKey(passphrase);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder().encode(plaintext);
  const ct = await crypto.subtle.encrypt({ name:"AES-GCM", iv }, key, enc);
  return {
    type: "secure-vault",
    version: "1.0.0",
    salt: saltBase64,
    iv: btoa(String.fromCharCode(...new Uint8Array(iv))),
    ciphertext: btoa(String.fromCharCode(...new Uint8Array(ct))),
    provenance: PROVENANCE,
    savedAt: new Date().toISOString(),
  };
}

async function decryptNotes(vault, passphrase) {
  const { key } = await deriveKey(passphrase, vault.salt);
  const iv = Uint8Array.from(atob(vault.iv), c=>c.charCodeAt(0));
  const ct = Uint8Array.from(atob(vault.ciphertext), c=>c.charCodeAt(0));
  const pt = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(pt);
}

async function storeVault(vault) {
  return new Promise((resolve, reject) => {
    const req = tx("vault","readwrite").put({ key:"securePlace", value: vault });
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function loadVault() {
  return new Promise((resolve, reject) => {
    const req = tx("vault").get("securePlace");
    req.onsuccess = () => resolve(req.result?.value || null);
    req.onerror = () => reject(req.error);
  });
}

const passEl = document.getElementById("pass");
const notesEl = document.getElementById("secureNotes");
const secureStatus = document.getElementById("secureStatus");

document.getElementById("saveSecureBtn").addEventListener("click", async () => {
  const pass = passEl.value;
  if (!pass) { alert("Set a passphrase first."); return; }
  const vault = await encryptNotes(notesEl.value, pass);
  await storeVault(vault);
  secureStatus.textContent = "Encrypted and saved at " + new Date().toLocaleTimeString();
});

document.getElementById("loadSecureBtn").addEventListener("click", async () => {
  const pass = passEl.value;
  if (!pass) { alert("Enter your passphrase to decrypt."); return; }
  const vault = await loadVault();
  if (!vault) { secureStatus.textContent = "No vault found."; return; }
  try {
    const plain = await decryptNotes(vault, pass);
    notesEl.value = plain;
    secureStatus.textContent = "Decrypted at " + new Date().toLocaleTimeString();
  } catch (e) {
    secureStatus.textContent = "Decryption failed — wrong passphrase or corrupted data.";
  }
});

document.getElementById("exportVaultBtn").addEventListener("click", async () => {
  const vault = await loadVault();
  if (!vault) { alert("No vault to export."); return; }
  const blob = new Blob([JSON.stringify(vault, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "secure-place.vault.json";
  a.click();
});

document.getElementById("importVaultFile").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  const vault = JSON.parse(text);
  if (vault.type !== "secure-vault") { alert("Invalid vault file."); return; }
  await storeVault(vault);
  secureStatus.textContent = "Vault imported.";
});

/* ======= Boot ======= */
openDB().then(async (opened) => {
  db = opened;
  redrawAll(await getAllStrokes());
  updateIntegrity();
});
</script>
</body>
</html>
