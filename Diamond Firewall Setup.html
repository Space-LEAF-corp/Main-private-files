<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diamond Firewall Setup</title>
<style>
    body {
        background: #0b0b0b;
        color: #e0e0e0;
        font-family: Arial, sans-serif;
        padding: 40px;
    }
    .section {
        background: #1a1a1a;
        padding: 25px;
        border-radius: 10px;
        border: 1px solid #333;
        margin-bottom: 30px;
    }
    h2 { color: #7fffd4; }
    textarea {
        width: 100%;
        padding: 10px;
        background: #222;
        border: 1px solid #444;
        border-radius: 5px;
        color: #e0e0e0;
        margin-top: 10px;
    }
    button {
        padding: 12px 20px;
        background-color: #7fffd4;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="section">
    <h2>Diamond Firewall Setup</h2>
    <p>Define your symbolic firewall boundaries for this local prototype.</p>

    <label>Firewall Name</label>
    <input type="text" placeholder="Example: Panther Shield">

    <label>Firewall Rules</label>
    <textarea rows="6" placeholder="Describe your personal firewall logic here..."></textarea>

    <button>Save Firewall (Local Only)</button>
</div>

</body>
</html>
