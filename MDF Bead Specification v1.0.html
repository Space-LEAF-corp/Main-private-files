<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MDF Bead Specification v1.0</title>
<style>
    body {
        background-color: #0b0b0b;
        color: #e0e0e0;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }
    header {
        background-color: #111;
        padding: 20px;
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        letter-spacing: 2px;
    }
    .container {
        padding: 30px;
        max-width: 900px;
        margin: auto;
    }
    .section {
        margin-bottom: 40px;
        padding: 20px;
        background-color: #1a1a1a;
        border-radius: 10px;
        border: 1px solid #333;
    }
    h2 {
        color: #7fffd4;
        margin-top: 0;
    }
    label {
        display: block;
        margin-top: 10px;
    }
    input, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        background-color: #222;
        border: 1px solid #444;
        color: #e0e0e0;
        border-radius: 5px;
    }
    button {
        margin-top: 20px;
        padding: 12px 20px;
        background-color: #7fffd4;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
</style>
</head>
<body>

<header>MDF Bead Specification v1.0</header>

<div class="container">

    <div class="section">
        <h2>Master Diamond Firewall Bead</h2>
        <p>The MDF bead represents the highest symbolic permission tier in the Space LEAF Corp bead logic system. It is a physical artifact representing personal boundary control, sovereignty, and user-defined firewall rules.</p>
    </div>

    <div class="section">
        <h2>Configure Your MDF Bead</h2>
        <label>Bead Name</label>
        <input type="text" placeholder="Example: Diamond Sentinel">

        <label>Symbolic Firewall Rules</label>
        <textarea rows="5" placeholder="Describe your personal firewall boundaries here..."></textarea>

        <label>Optional Physical Artifact Description</label>
        <textarea rows="4" placeholder="Material, color, engraving, shape..."></textarea>

        <button>Save MDF Configuration (Local Only)</button>
    </div>

</div>

</body>
</html>
